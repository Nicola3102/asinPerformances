services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: rug
      MYSQL_USER: rug_user
      MYSQL_PASSWORD: rug_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
    ports:
      - "9090:9090"
    env_file:
      - ./backend/.env
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: rug_user
      MYSQL_PASSWORD: rug_password
      MYSQL_DATABASE: rug
    # 注意：--reload 会在文件变更时重启进程，长查询（如 New Listing 大区间）会被中断，表现为“查询无结果/无响应”。
    # 如需后端热重载，可在本机直接运行 uvicorn --reload；docker 默认关闭以保证请求稳定。
    command: uvicorn app.main:app --host 0.0.0.0 --port 9090
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_HOST=backend
      - VITE_API_PROXY_TARGET=http://backend:9090
    depends_on:
      - backend

volumes:
  mysql_data:
  frontend_node_modules: