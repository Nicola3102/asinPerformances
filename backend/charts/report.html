<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>每日上新 Session 报表</title>

  <style>
    :root { font-family: system-ui, "PingFang SC", "Microsoft YaHei", sans-serif; }
    body { margin: 0; padding: 24px; background: #f4f4f5; color: #18181b; }
    h1 { font-size: 1.25rem; margin: 0 0 8px; }

      min-width: 200px;

    .muted { font-size: 0.8rem; color: #71717a; margin-top: 4px; }
    .chart-wrap {
      background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 3px rgb(0 0 0 / 0.08);
      max-width: 1200px;
    }
    canvas { max-height: 480px; }
  </style>
</head>
<body>
  <h1>每日上新 Session（按批次堆叠）</h1>

  </div>
  <p class="muted" id="kpiSourceHint" style="margin-bottom:16px"></p>

    <p id="noData" class="muted" style="display:none">当前店铺与区间内无 session 数据。</p>

  <script>
  const P = JSON.parse(document.getElementById('payload').textContent);
  const sel = document.getElementById('storeSel');
  const sinceLbl = document.getElementById('sinceLbl');
  const rangeHint = document.getElementById('rangeHint');
  const kpiTotal = document.getElementById('kpiTotal');
  const kpiActive = document.getElementById('kpiActive');

  sinceLbl.textContent = P.listingSince;
  rangeHint.textContent = 'session 区间：' + P.sessionStart + ' ~ ' + P.sessionEnd + ' · 生成日 ' + P.generatedAt;
  var kpiHint = document.getElementById('kpiSourceHint');
  if (P.kpiSource === 'amazon_listing') {
    kpiHint.textContent = '说明：上新 ASIN 总数 / Active / 当日上新 ASIN 数均来自线上 amazon_listing（按 DATE(created_at)），不依赖是否有 session 同步；堆叠柱与折线仍来自本地 daily_upload_asin_dates。';
  } else {
    kpiHint.textContent = '说明：线上库未配置或不可用，上新相关指标回退为本地 daily_upload_asin_dates（与 listing 口径可能不一致）。';
  }

  sel.innerHTML = '';
  const optAll = document.createElement('option');
  optAll.value = 'all';
  optAll.textContent = '全部店铺（聚合）';
  sel.appendChild(optAll);
  (P.storeIds || []).forEach(function (id) {
    const o = document.createElement('option');
    o.value = String(id);
    o.textContent = '店铺 ' + id;
    sel.appendChild(o);
  });

  let chart = null;

  function viewForKey(k) {
    return P.views[k] || P.views.all;
  }

    function applyView(k) {
    const v = viewForKey(k);
    const noData = document.getElementById('noData');
    const ctx = document.getElementById('ch');
    kpiTotal.textContent = v.kpi.totalAsin.toLocaleString();
    kpiActive.textContent = v.kpi.activeAsin.toLocaleString();

    if (!v.labels.length || !v.datasets.length) {
      noData.style.display = 'block';
      ctx.style.display = 'none';
      if (chart) { chart.destroy(); chart = null; }
      return;
    }
    noData.style.display = 'none';
    ctx.style.display = 'block';

    var lt = (v.lineTotal && v.lineTotal.length) ? v.lineTotal.map(Number) : v.byDay.map(function (d) { return d.totalSessions; });
    var maxY = 0;
    for (var i = 0; i < lt.length; i++) { if (lt[i] > maxY) maxY = lt[i]; }
    maxY = maxY > 0 ? maxY : 1;
    var yMax = maxY * 1.12;

    var lineDs = {
      type: 'line',
      label: '当日 sessions 合计',
      data: lt,
      borderColor: '#111827',
      backgroundColor: 'transparent',
      borderWidth: 2.5,
      pointRadius: 4,
      pointBackgroundColor: '#111827',
      tension: 0.2,
      order: 100,
      yAxisID: 'y1',
    };

    const cfg = {
      type: 'bar',
      data: {
        labels: v.labels,
        datasets: v.datasets.concat([lineDs]),
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        interaction: { mode: 'index', intersect: false },
        scales: {
          x: { stacked: true, ticks: { maxRotation: 45, minRotation: 0 } },
          y: {
            stacked: true,
            beginAtZero: true,
            max: yMax,
            title: { display: true, text: 'Sessions（堆叠）' },
          },
          y1: {
            stacked: false,
            beginAtZero: true,
            max: yMax,
            position: 'right',
            grid: { drawOnChartArea: false },
            title: { display: true, text: '合计（折线）' },
          },
        },
        plugins: {
          legend: { position: 'top', labels: { boxWidth: 12, font: { size: 10 } } },
          tooltip: {
            callbacks: {
              title: function (items) {
                if (!items.length) return '';
                const idx = items[0].dataIndex;
                const day = v.byDay[idx];
                return day ? day.sessionDate : '';
              },
              afterBody: function (items) {
                if (!items.length) return [];
                const idx = items[0].dataIndex;
                const day = v.byDay[idx];
                if (!day) return [];
                const lines = [];
                lines.push('────────');
                lines.push('当日 sessions 合计: ' + day.totalSessions.toLocaleString());
                lines.push('当日上新 ASIN 数: ' + day.newAsinCount.toLocaleString());
                if (day.cohortParts.length) {
                  lines.push('各批次 sessions:');
                  day.cohortParts.forEach(function (p) {
                    lines.push('  · 批次 ' + p.cohort + ': ' + p.sessions.toLocaleString());
                  });
                }
                return lines;
              },
            },
          },
        },
      },
    };

    if (chart) chart.destroy();
    chart = new Chart(ctx, cfg);
  }

  sel.addEventListener('change', function () {
    applyView(sel.value);
  });
  applyView('all');
  </script>
