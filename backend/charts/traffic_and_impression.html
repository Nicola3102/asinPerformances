<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sessions + 周 Impression</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e8ecf1;
      --muted: #8b9cb3;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 2.5rem;
    }
    h1 {
      font-weight: 600;
      font-size: 1.35rem;
      margin: 0 0 0.35rem;
    }
    .sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 1rem; line-height: 1.5; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1.25rem;
      margin-bottom: 1rem;
      padding: 0.85rem 1rem;
      background: var(--panel);
      border-radius: 10px;
      border: 1px solid rgba(125, 211, 192, 0.12);
    }
    label { font-size: 0.8rem; color: var(--muted); }
    select {
      background: #243044;
      color: var(--text);
      border: 1px solid rgba(61, 157, 255, 0.35);
      border-radius: 6px;
      padding: 0.45rem 0.65rem;
      font-size: 0.9rem;
      min-width: 200px;
    }
    .chart-box {
      background: var(--panel);
      border-radius: 12px;
      padding: 1rem 0.75rem 1.25rem;
      border: 1px solid rgba(61, 157, 255, 0.1);
    }
    canvas { max-height: 440px; }
    #detailPanel {
      display: none;
      margin-top: 1rem;
      padding: 1rem 1.1rem;
      background: #243044;
      border-radius: 10px;
      border: 1px solid rgba(255, 179, 71, 0.35);
      font-size: 0.9rem;
      line-height: 1.55;
    }
    #detailPanel h3 { margin: 0 0 0.5rem; font-size: 1rem; color: #ffb347; }
    #detailPanel .row { margin: 0.35rem 0; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Traffic daily + 周 Impression</h1>
    <p class="sub">
      绿线/填色：amazon_sales_and_traffic_daily 按日 <code>SUM(sessions)</code>（左轴）。<br />
      橙点折线：amazon_search_data 在 <code>start_date</code> 区间内按 <code>store_id + week_no</code> 汇总
      <code>SUM(impression_count)</code>（右轴）；点取当周 <code>start_date</code> 最小～最大日期的<strong>中间日历日</strong>，点上为 <code>week_no</code>。<br />
      <strong>点击橙色周点</strong>查看该周区间与 impression 明细。
    </p>
    <div class="toolbar">
      <div>
        <label for="storeSel">店铺</label><br />
        <select id="storeSel">
          <option value="">全部店铺（合计）</option>
        </select>
      </div>
    </div>
    <div class="chart-box">
      <canvas id="c" height="120"></canvas>
    </div>
    <div id="detailPanel"><h3>周 impression 详情</h3><div id="detailBody"></div></div>
  </div>
  <script>
    if (typeof ChartDataLabels !== 'undefined') {
      Chart.register(ChartDataLabels);
    }
    var payload = {"labels": ["2026-02-22", "2026-02-23", "2026-02-24", "2026-02-25", "2026-02-26", "2026-02-27", "2026-02-28", "2026-03-01", "2026-03-02", "2026-03-03", "2026-03-04", "2026-03-05", "2026-03-06", "2026-03-07", "2026-03-08", "2026-03-09", "2026-03-10", "2026-03-11", "2026-03-12", "2026-03-13", "2026-03-14", "2026-03-15", "2026-03-16", "2026-03-17", "2026-03-18", "2026-03-19", "2026-03-20", "2026-03-21", "2026-03-22", "2026-03-23", "2026-03-24", "2026-03-25", "2026-03-26", "2026-03-27", "2026-03-28", "2026-03-29", "2026-03-30", "2026-03-31", "2026-04-01", "2026-04-02", "2026-04-03", "2026-04-04"], "store_ids": [1, 7, 12, 25], "all_data": [5511, 5093, 5648, 5420, 5174, 4986, 5201, 6459, 6314, 6025, 5529, 4951, 5921, 6541, 6792, 5585, 5474, 5822, 5874, 5137, 5588, 6312, 5119, 5092, 5520, 5121, 5195, 5695, 5854, 5576, 4252, 4334, 4488, 4088, 4248, 4448, 4214, 3796, 3546, 0, 0, 0], "by_store": {"1": [2717, 2357, 2584, 2396, 2382, 2265, 2511, 3180, 3088, 2945, 2623, 2309, 2921, 3360, 3463, 2748, 2690, 2873, 2872, 2474, 2787, 3310, 2463, 2423, 2615, 2528, 2576, 3094, 3036, 2879, 2703, 2837, 2632, 2456, 2875, 3157, 2718, 2458, 2344, 0, 0, 0], "7": [71, 65, 75, 46, 43, 51, 68, 46, 54, 67, 64, 24, 42, 68, 90, 53, 31, 49, 58, 48, 83, 69, 66, 38, 47, 50, 55, 60, 57, 88, 76, 75, 110, 81, 95, 97, 85, 81, 95, 0, 0, 0], "12": [1036, 994, 1121, 1225, 1013, 1050, 945, 1231, 1250, 1160, 1006, 945, 1111, 1106, 1275, 1099, 969, 1021, 1145, 958, 981, 1029, 887, 845, 1066, 886, 821, 802, 906, 891, 928, 1024, 1388, 1179, 941, 860, 1049, 869, 708, 0, 0, 0], "25": [1687, 1677, 1868, 1753, 1736, 1620, 1677, 2002, 1922, 1853, 1836, 1673, 1847, 2007, 1964, 1685, 1784, 1879, 1799, 1657, 1737, 1904, 1703, 1786, 1792, 1657, 1743, 1739, 1855, 1718, 545, 398, 358, 372, 337, 334, 362, 388, 399, 0, 0, 0]}, "impressionEnabled": true, "impression_all": [null, null, null, 152722, null, null, null, null, null, null, 203017, null, null, null, null, null, null, 403959, null, null, null, null, ll, null, null, null, null, null, null, null, null, null, null, null]}, "impression_meta_by_store": {"1": [null, null, null, {"weeks": [{"week_no": "202609", "impressions": 128860, "d_min": "2026-02-22", "d_max": "2026-02-28", "mid": "2026-02-25", "store_id": 1}]}, null, null, null, null, null, null, {"weeks": [{"week_no": "202610", "impressions": 197571, "d_min": "2026-03-01", "d_max": "2026-03-07", "mid": "2026-03-04", "store_id": 1}]}, null, null, null, null, null, null, {"weeks": [{"week_no": "202611", "impressions": 338906, "d_min": "2026-03-08", "d_max": "2026-03-14", "mid": "2026-03-11", "store_id": 1}]}, null, null, null, null, null, null, {"weeks": [{"week_no": "202612", "impressions": 70511, "d_min": "2026-03-15", "d_max": "2026-03-21", "mid": "2026-03-18", "store_id": 1}]}, null, null, null, null, null, null, {"weeks": [{"week_no": "202613", "impressions": 55460, "d_min": "2026-03-22", "d_max": "2026-03-28", "mid": "2026-03-25", "store_id": 1}]}, null, null, null, null, null, null, null, null, null, null], "7": [null, null, null, {"weeks": [{"week_no": "202609", "impressions": 23494, "d_min": "2026-02-22", "d_max": "2026-02-28", "mid": "2026-02-25", "store_id": 7}]}, null, null, null, null, null, null, {"weeks": [{"week_no": "202610", "impressions": 5446, "d_min": "2026-03-01", "d_max": "2026-03-07", "mid": "2026-03-04", "store_id": 7}]}, null, null, null, null, null, null, {"weeks": [{"week_no": "202611", "impressions": 65053, "d_min": "2026-03-08", "d_max": "2026-03-14", "mid": "2026-03-11", "store_id": 7}]}, null, null, null, null, null, null, {"weeks": [{"week_no": "202612", "impressions": 15564, "d_min": "2026-03-15", "d_max": "2026-03-21", "mid": "2026-03-18", "store_id": 7}]}, null, null, null, null, null, null, {"weeks": [{"week_no": "202613", "impressions": 5264, "d_min": "2026-03-22", "d_max": "2026-03-28", "mid": "2026-03-25", "store_id": 7}]}, null, null, null, null, null, null, null, null, null, null], "12": [null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null], "25": [null, null, null, {"weeks": [{"week_no": "202609", "impressions": 368, "d_min": "2026-02-22", "d_max": "2026-02-28", "mid": "2026-02-25", "store_id": 25}]}, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null, null]}};
    var labels = payload.labels;
    var allData = payload.all_data;
    var byStore = payload.by_store;
    var storeIds = payload.store_ids || [];
    var impOn = payload.impressionEnabled;
    var impAll = payload.impression_all || [];
    var impAllMeta = payload.impression_all_meta || [];
    var impByStore = payload.impression_by_store || {};
    var impMetaByStore = payload.impression_meta_by_store || {};

    var sel = document.getElementById('storeSel');
    storeIds.forEach(function (sid) {
      var o = document.createElement('option');
      o.value = String(sid);
      o.textContent = 'store_id = ' + sid;
      sel.appendChild(o);
    });

    var panel = document.getElementById('detailPanel');
    var detailBody = document.getElementById('detailBody');

    function currentImpressionSeries() {
      var v = sel.value;
      if (!impOn) return { data: [], meta: [] };
      if (!v) return { data: impAll, meta: impAllMeta };
      return {
        data: impByStore[v] || labels.map(function () { return null; }),
        meta: impMetaByStore[v] || labels.map(function () { return null; })
      };
    }

    function hideDetail() {
      panel.style.display = 'none';
      detailBody.innerHTML = '';
    }

    function showDetail(meta) {
      if (!meta || !meta.weeks || !meta.weeks.length) return;
      var html = '';
      meta.weeks.forEach(function (w) {
        html += '<div class="row"><strong>week_no</strong> ' + escapeHtml(String(w.week_no));
        if (w.store_id != null) html += ' · store_id ' + escapeHtml(String(w.store_id));
        html += '</div>';
        html += '<div class="row">impressions: <strong>' + Number(w.impressions).toLocaleString() + '</strong></div>';
        html += '<hr style="border:none;border-top:1px solid rgba(255,255,255,0.12);margin:0.6rem 0"/>';
      });
      detailBody.innerHTML = html;
      panel.style.display = 'block';
    }

    function escapeHtml(s) {
      if (s == null) return '';
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    var impSeries = currentImpressionSeries();
    var ctx = document.getElementById('c').getContext('2d');
    var chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'Sessions（左轴）',
            data: allData,
            yAxisID: 'y',
            borderColor: '#7dd3c0',
            backgroundColor: 'rgba(125, 211, 192, 0.12)',
            fill: true,
            tension: 0.22,
            pointRadius: 2,
            pointHoverRadius: 5,
            borderWidth: 2,
            order: 2,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        interaction: { mode: 'nearest', intersect: true },
        onClick: function (ev, els, ch) {
          if (!els.length) return;
          var el = els[0];
          var ix = el.index;
          // 以“当前店铺选择”对应的 meta 为准，避免 dataset._impressionMeta 在更新时出现错位
          // （尤其是切换 store 后，确保数值和 week_no 明细一致）
          var meta = null;
          try {
            var is = currentImpressionSeries();
            meta = (is && is.meta && is.meta[ix]) ? is.meta[ix] : null;
          } catch (e) {
            meta = null;
          }
          if (meta) showDetail(meta);
        },
        plugins: {
          legend: { labels: { color: '#c5d0de' } },
          tooltip: {
            callbacks: {
              label: function (ctx) {
                var v = ctx.parsed.y;
                if (v == null) return '';
                if (ctx.dataset.yAxisID === 'y1')
                  return ' impressions: ' + Number(v).toLocaleString();
                return ' sessions: ' + Number(v).toLocaleString();
              },
            },
          },
          datalabels: {
            display: function (ctx) {
              if (ctx.dataset.yAxisID !== 'y1') return false;
              var v = ctx.dataset.data[ctx.dataIndex];
              return v != null && v !== '' && !isNaN(Number(v));
            },
            color: '#ffb347',
            backgroundColor: 'rgba(0,0,0,0.45)',
            borderRadius: 4,
            padding: { top: 2, bottom: 2, left: 4, right: 4 },
            font: { size: 10, weight: '600' },
            align: 'top',
            offset: 6,
            formatter: function (value, ctx) {
              var m = ctx.dataset._impressionMeta && ctx.dataset._impressionMeta[ctx.dataIndex];
              if (!m || !m.weeks || !m.weeks.length) return '';
              return m.weeks.map(function (w) { return w.week_no; }).join(',');
            },
          },
        },
        scales: {
          x: {
            ticks: { color: '#8b9cb3', maxRotation: 45 },
            grid: { color: 'rgba(139, 156, 179, 0.08)' },
          },
          y: {
            id: 'y',
            position: 'left',
            beginAtZero: true,
            title: { display: true, text: 'Sessions', color: '#8b9cb3' },
            ticks: {
              color: '#8b9cb3',
              callback: function (v) { return Number(v).toLocaleString(); },
            },
            grid: { color: 'rgba(139, 156, 179, 0.1)' },
          },
          y1: {
            id: 'y1',
            position: 'right',
            beginAtZero: true,
            display: impOn,
            title: { display: true, text: '周 Impressions', color: '#ffb347' },
            ticks: {
              color: '#ffb347',
              callback: function (v) { return Number(v).toLocaleString(); },
            },
            grid: { drawOnChartArea: false },
          },
        },
      },
    });

    if (impOn) {
      var dsImp = {
        label: '周 impressions（右轴，点即 week 中点）',
        data: impSeries.data,
        yAxisID: 'y1',
        borderColor: '#ffb347',
        backgroundColor: 'rgba(255, 179, 71, 0.15)',
        fill: false,
        tension: 0.2,
        spanGaps: false,
        pointRadius: 6,
        pointHoverRadius: 9,
        pointBackgroundColor: '#ffb347',
        pointBorderColor: '#1a2332',
        pointBorderWidth: 2,
        borderWidth: 2,
        order: 1,
      };
      dsImp._impressionMeta = impSeries.meta;
      chart.data.datasets.push(dsImp);
      chart.update();
    }

    function applyStore() {
      hideDetail();
      var v = sel.value;
      var ds0 = chart.data.datasets[0];
      if (!v) {
        ds0.label = 'Sessions（全部店铺合计）';
        ds0.data = allData;
        ds0.borderColor = '#7dd3c0';
        ds0.backgroundColor = 'rgba(125, 211, 192, 0.12)';
      } else {
        ds0.label = 'store_id ' + v + ' sessions';
        ds0.data = byStore[v] || labels.map(function () { return 0; });
        ds0.borderColor = '#3d9dff';
        ds0.backgroundColor = 'rgba(61, 157, 255, 0.12)';
      }
      if (impOn && chart.data.datasets.length > 1) {
        var is = currentImpressionSeries();
        chart.data.datasets[1].data = is.data;
        chart.data.datasets[1]._impressionMeta = is.meta;
      }
      chart.update();
    }
    sel.addEventListener('change', applyStore);
  </script>
</body>
</html>
